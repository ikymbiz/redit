name: Daily Prompt Scraper

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日日本時間午前9時に実行
  workflow_dispatch:      # 手動実行ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # リポジトリへの書き込み権限
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          # SDKを最新版に強制アップデートして404エラーを防ぐ
          pip install -U feedparser google-generativeai

      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # reportsフォルダを確実に作成
          mkdir -p reports
          git add reports/
          
          # 変更がある場合のみコミットする（エラー回避）
          if ! git diff-index --quiet HEAD; then
            git commit -m "Update daily prompt hacks"
            git push
          else
            echo "No new hacks found today. Skipping commit."
          fi
