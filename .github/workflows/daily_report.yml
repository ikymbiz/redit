name: Daily Prompt Scraper

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日日本時間午前9時に実行
  workflow_dispatch:      # 手動実行ボタンも有効化

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # リポジトリへの書き込み権限
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser google-generativeai

      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add reports/*.md
          git commit -m "Update daily prompt hacks [skip ci]" || echo "No changes to commit"
          git push
